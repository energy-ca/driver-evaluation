<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class 1 Oilfield Evaluation</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --red: #ea4335; --green: #34a853; --blue: #4285f4; --dark: #121212; }
        body { font-family: sans-serif; background: var(--dark); color: white; padding: 15px; }
        #gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .section { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-top: 4px solid var(--blue); }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-start { flex: 1; background: var(--green); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; }
        .btn-stop { flex: 1; background: var(--red); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; }
        input, textarea { width: 100%; background: #2b2b2b; color: white; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; margin-top: 5px; }
        canvas { background: white; border-radius: 8px; width: 100%; height: 120px; }
        .desc { font-size: 13px; color: #888; margin-bottom: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="gate">
        <p>Fleet Access Code</p>
        <input type="password" id="pin" maxlength="4" oninput="if(this.value==='2008') document.getElementById('gate').style.display='none'">
    </div>

    <h1>Driver Evaluation</h1>

    <div class="section">
        <label>Evaluation Date</label>
        <input type="date" id="evalDate">
        <label>Driver Name</label>
        <input type="text" id="driverName" placeholder="Full Name">
        <label>Unit #</label>
        <input type="text" id="unitNum" placeholder="Truck/Trailer ID">
    </div>

    <div class="section">
        <h3>1. Trip Prep & Air Brakes</h3>
        <p class="desc">Includes Pre-trip inspection, logbook verification, air system leak tests, and brake adjustments.</p>
        <div class="controls">
            <button class="btn-start" onclick="startRec('txt1')">START REC</button>
            <button class="btn-stop" onclick="stopRec()">STOP</button>
        </div>
        <textarea id="txt1" rows="3" placeholder="Waiting for voice..."></textarea>
    </div>

    <div class="section">
        <h3>5. Final Summary</h3>
        <p class="desc">Overall competency, safety mindset, and dispatch readiness recommendation.</p>
        <div class="controls">
            <button class="btn-start" onclick="startRec('txt5')">START REC</button>
            <button class="btn-stop" onclick="stopRec()">STOP</button>
        </div>
        <textarea id="txt5" rows="3"></textarea>
    </div>

    <div class="section">
        <h3>Signatures</h3>
        <canvas id="sigTrainer"></canvas>
        <button onclick="sig1.clear()" style="margin-bottom:10px">Clear Trainer</button>
        <canvas id="sigDriver"></canvas>
        <button onclick="sig2.clear()">Clear Driver</button>
    </div>

    <button id="submitBtn" onclick="sendData()" style="width:100%; background:var(--green); color:white; padding:20px; border:none; border-radius:12px; font-size:20px;">SUBMIT & CLEAN WITH AI</button>

    <script>
        // Set default date to today
        document.getElementById('evalDate').valueAsDate = new Date();

        let recognition;
        const sig1 = new SignaturePad(document.getElementById('sigTrainer'));
        const sig2 = new SignaturePad(document.getElementById('sigDriver'));

        function startRec(id) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let final = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                }
                document.getElementById(id).value += final;
            };
            recognition.start();
        }

        function stopRec() {
            if (recognition) recognition.stop();
        }

        function sendData() {
            // Fetch logic to Google Script URL...
        }
    </script>
</body>
</html>

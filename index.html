<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Evaluation</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:15px;
}

.section{
background:#1d1d1d;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

textarea{
width:100%;
min-height:90px;
background:#2a2a2a;
color:white;
border:1px solid #444;
border-radius:6px;
padding:10px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#2a2a2a;
color:white;
border:1px solid #444;
border-radius:6px;
}

.controls{
display:flex;
gap:10px;
margin-bottom:10px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.start{background:#222;color:#00e676}
.stop{background:#222;color:#ff5252}
.gpt{background:#1565c0;color:white}

.rec-active{
animation:blink 1s infinite;
background:#600;
color:white;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

canvas{
background:white;
border-radius:8px;
width:100%;
height:180px;
}

.approvalBox{
display:none;
}

</style>
</head>

<body>

<h2>Driver Training & Assessment</h2>

<div class="section">

<label>Division</label>
<select id="division">
<option>Snubbing</option>
<option>Nitrogen</option>
<option>Shop</option>
</select>

<label>Trainer</label>
<select id="trainer">
<option selected>Dave Feaver</option>
<option>Other</option>
</select>

<label>Driver</label>
<input id="driver">

<label>Date</label>
<input type="date" id="date">

<label>DL Class</label>
<select id="dl_class">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
</select>

<label>Endorsement</label>
<select id="dl_end">
<option value="">None</option>
<option>Q</option>
<option>B</option>
<option>S</option>
<option>F</option>
</select>

<label>Units</label>
<input id="units">

</div>

<script>
document.getElementById("date").valueAsDate=new Date()
</script>

<!-- SECTION TEMPLATE -->

<script>

let recognition
let activeArea
let stopBtn

function voiceStart(id,btn){

if(recognition)recognition.stop()

activeArea=document.getElementById(id)
stopBtn=btn.nextElementSibling

recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
recognition.continuous=true
recognition.interimResults=true

let final=""

recognition.onstart=()=>{
stopBtn.classList.add("rec-active")
}

recognition.onresult=(e)=>{

let interim=""

for(let i=e.resultIndex;i<e.results.length;i++){

if(e.results[i].isFinal){
final+=e.results[i][0].transcript+". "
}else{
interim+=e.results[i][0].transcript
}

}

activeArea.value=final+interim

}

recognition.onend=()=>{
stopBtn.classList.remove("rec-active")
}

recognition.start()

}

function voiceStop(){
if(recognition)recognition.stop()
}

</script>

<!-- SECTIONS -->

<script>

function section(id,title,desc){
document.write(`
<div class="section">

<h3>${title}</h3>
<p>${desc}</p>

<div class="controls">
<button class="start" onclick="voiceStart('${id}',this)">START</button>
<button class="stop" onclick="voiceStop()">STOP</button>
<button class="gpt" onclick="improve('${id}')">GPT Improve</button>
</div>

<textarea id="${id}"></textarea>

</div>
`)
}

</script>

<script>

section("s1","1 General & Procedures",
"Accident procedures, inspections, coupling, chaining, backing, TDG")

section("s2","2 Main Driving",
"Shifting ability, steering control, speed control, following distance")

section("s3","3 Intersections & RR Crossings",
"Look reach listen, braking, gear control")

section("s4","4 Equipment Operations",
"Clutch, transmission, engine brake")

section("s5","5 Defensive Driving",
"Anticipating conflict, speed for conditions")

</script>

<!-- REMARKS -->

<div class="section">

<h3>Evaluation Remarks</h3>

<label>Strengths</label>
<textarea id="strengths"></textarea>

<label>Weakness</label>
<textarea id="weakness"></textarea>

<label>Recommendations</label>
<textarea id="recommendations"></textarea>

</div>

<!-- CONCLUSION -->

<div class="section">

<h3>Conclusion</h3>

<button onclick="setConclusion('Not Approved')">Not Approved</button>
<button onclick="setConclusion('Approved')">Approved</button>

<div id="approvalMenu" class="approvalBox">

<h4>Approved For</h4>

<label><input type="checkbox" value="Tractor Trailer"> Tractor Trailer</label><br>
<label><input type="checkbox" value="Tandem Steer"> Tandem Steer</label><br>
<label><input type="checkbox" value="Over Dimension"> Over Dimension</label><br>
<label><input type="checkbox" value="Automatic"> Automatic</label><br>
<label><input type="checkbox" value="Manual"> Manual/Standard</label>

</div>

</div>

<script>

let conclusion=""

function setConclusion(val){

conclusion=val

if(val=="Approved"){
document.getElementById("approvalMenu").style.display="block"
}else{
document.getElementById("approvalMenu").style.display="none"
}

updateSummary()

}

</script>

<!-- NEXT EVAL -->

<div class="section">

<h3>Estimate Next Evaluation</h3>

<select id="next_eval">

<option value="date">Date (+3 months)</option>
<option>N/A</option>
<option>Post Incidents/As Required</option>

</select>

</div>

<!-- NOTES -->

<div class="section">

<h3>Notes</h3>

<textarea id="notes"></textarea>

</div>

<!-- SUMMARY -->

<div class="section">

<h3>Conclusion Summary</h3>

<div id="summary"></div>

</div>

<script>

function updateSummary(){

let approved=[]

document.querySelectorAll("#approvalMenu input:checked")
.forEach(x=>approved.push(x.value))

let txt="Conclusion: "+conclusion

if(approved.length){
txt+="<br>Approved For: "+approved.join(", ")
}

document.getElementById("summary").innerHTML=txt

}

document.querySelectorAll("#approvalMenu input")
.forEach(x=>x.onchange=updateSummary)

</script>

<!-- SIGNATURES -->

<div class="section">

<h3>Trainer Signature</h3>

<canvas id="sig1"></canvas>
<button onclick="pad1.clear()">Clear</button>

<h3>Driver Signature</h3>

<canvas id="sig2"></canvas>
<button onclick="pad2.clear()">Clear</button>

</div>

<script>

const canvas1=document.getElementById("sig1")
const canvas2=document.getElementById("sig2")

const pad1=new SignaturePad(canvas1)
const pad2=new SignaturePad(canvas2)

function resize(){

[canvas1,canvas2].forEach(c=>{

let r=Math.max(window.devicePixelRatio||1,1)

c.width=c.offsetWidth*r
c.height=c.offsetHeight*r

c.getContext("2d").scale(r,r)

})

}

window.onresize=resize
resize()

</script>

<!-- SUBMIT -->

<button onclick="submit()">Submit</button>

<script>

function submit(){

let dl=
document.getElementById("dl_class").value+
document.getElementById("dl_end").value

let nextEval=document.getElementById("next_eval").value

if(nextEval=="date"){

let d=new Date()

d.setMonth(d.getMonth()+3)

nextEval=d.toISOString().split("T")[0]

}

let approved=[]

document.querySelectorAll("#approvalMenu input:checked")
.forEach(x=>approved.push(x.value))

let data={

division:division.value,
trainer:trainer.value,
driver:driver.value,
date:date.value,
dl_class:dl,
units:units.value,

general:s1.value,
main:s2.value,
intersections:s3.value,
equipment:s4.value,
defensive:s5.value,

strengths:strengths.value,
weakness:weakness.value,
recommendations:recommendations.value,

conclusion:conclusion,
approved_for:approved.join(", "),

next_evaluation:nextEval,
notes:notes.value,

sig_trainer:pad1.toDataURL(),
sig_driver:pad2.toDataURL()

}

console.log(data)

alert("Ready for Apps Script")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Training Assessment</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
margin:0;
padding:15px;
}

#gate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#gate input{
font-size:40px;
width:180px;
text-align:center;
background:#222;
border:2px solid #33b5e5;
color:white;
border-radius:10px;
letter-spacing:8px;
}

.section{
background:#1e1e1e;
padding:18px;
border-radius:12px;
margin-bottom:20px;
}

textarea{
width:100%;
min-height:110px;
background:#2a2a2a;
color:white;
border:1px solid #444;
border-radius:8px;
padding:10px;
font-size:16px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#2a2a2a;
color:white;
border:1px solid #444;
border-radius:8px;
}

.controls{
display:flex;
gap:8px;
margin-bottom:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.start{background:#263238;color:#00e676}
.stop{background:#263238;color:#ff5252}
.improve{background:#1565c0;color:white}

.rec-active{
animation:blink 1s infinite;
background:#600 !important;
color:white;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.4}
100%{opacity:1}
}

.approveBtn{
background:#00c853;
color:white;
font-size:18px;
}

.rejectBtn{
background:#d50000;
color:white;
font-size:18px;
}

canvas{
background:white;
border-radius:8px;
width:100%;
height:180px;
}

.approvalBox{
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<!-- PIN ACCESS -->

<div id="gate">
<h2 style="color:#33b5e5">FLEET PIN</h2>
<input type="password" maxlength="4" id="pin" oninput="unlock()">
</div>

<script>
function unlock(){
if(document.getElementById("pin").value==="2008"){
document.getElementById("gate").style.display="none"
}
}
</script>

<h2>Driver Training & Assessment</h2>

<!-- HEADER -->

<div class="section">

<label>Division</label>
<select id="division">
<option>Snubbing</option>
<option>Nitrogen</option>
<option>Shop</option>
</select>

<label>Trainer</label>
<select id="trainer">
<option selected>Dave Feaver</option>
<option>Other</option>
</select>

<label>Driver</label>
<input id="driver">

<label>Date</label>
<input type="date" id="date">

<label>DL Class</label>
<select id="dl_class">
<option value="1">Class 1 – Tractor Trailer</option>
<option value="3">Class 3 – Heavy Truck</option>
<option value="5">Class 5 – Standard Vehicle</option>
</select>

<label>Endorsement</label>
<select id="dl_end">
<option value="">None</option>
<option value="Q">Q – Air Brake</option>
</select>

<label>Units</label>
<input id="units">

</div>

<script>
document.getElementById("date").valueAsDate=new Date()
</script>

<!-- VOICE ENGINE -->
<script>

let recognition = null;
let activeArea = null;
let activeBtn = null;
let finalTranscript = "";
let restartTimer = null;
let isRecording = false;

function voiceStart(areaId, startBtn) {
    // Stop any existing session first
    voiceStop();

    activeArea = document.getElementById(areaId);
    activeBtn = startBtn.nextElementSibling; // the STOP button
    finalTranscript = activeArea.value;
    isRecording = true;

    startBtn.classList.add("rec-active");
    startBtn.textContent = "● REC";

    startSession();
}

function startSession() {
    if (!isRecording) return;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Speech recognition not supported in this browser. Try Chrome.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = "en-US";
    recognition.maxAlternatives = 1;

    recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalTranscript += transcript + " ";
            } else {
                interim = transcript;
            }
        }
        activeArea.value = finalTranscript + interim;
        // Auto-scroll to bottom
        activeArea.scrollTop = activeArea.scrollHeight;
    };

    recognition.onerror = (event) => {
        console.log("Speech error:", event.error);
        // network/audio errors — auto-restart
        if (event.error === "network" || event.error === "audio-capture") {
            scheduleRestart();
        }
        // no-speech timeout — auto-restart silently
        if (event.error === "no-speech") {
            scheduleRestart();
        }
        // aborted intentionally — do nothing
    };

    recognition.onend = () => {
        // If we're still supposed to be recording, restart automatically
        if (isRecording) {
            scheduleRestart();
        }
    };

    recognition.start();
}

function scheduleRestart() {
    if (!isRecording) return;
    clearTimeout(restartTimer);
    // Short delay prevents a rapid restart loop on mobile
    restartTimer = setTimeout(() => {
        if (isRecording) startSession();
    }, 300);
}

function voiceStop() {
    isRecording = false;
    clearTimeout(restartTimer);

    if (recognition) {
        recognition.stop();
        recognition = null;
    }

    // Reset all START buttons
    document.querySelectorAll(".start").forEach(btn => {
        btn.classList.remove("rec-active");
        btn.textContent = "START";
    });
}
</script>

<!-- IMPROVE -->

<script>

function improve(id){

let txt=document.getElementById(id).value

if(!txt)return

txt=txt.trim()

txt=txt.charAt(0).toUpperCase()+txt.slice(1)

if(!txt.endsWith("."))txt+="."

document.getElementById(id).value=txt

}

</script>

<!-- SECTION GENERATOR -->

<script>

function section(id,title){

document.write(`

<div class="section">

<h3>${title}</h3>

<div class="controls">
<button class="start" onclick="voiceStart('${id}',this)">START</button>
<button class="stop" onclick="voiceStop()">STOP</button>
<button class="improve" onclick="improve('${id}')">Improve</button>
</div>

<textarea id="${id}"></textarea>

</div>

`)

}

</script>

<script>

section("general","1 General & Procedures")
section("main","2 Main Driving")
section("intersections","3 Intersections & RR Crossings")
section("equipment","4 Equipment Operations")
section("defensive","5 Defensive Driving")
section("strengths","Strengths")
section("weakness","Weakness")
section("recommendations","Recommendations")

</script>

<!-- CONCLUSION -->

<div class="section">

<h3>Conclusion</h3>

<div class="controls">
<button class="approveBtn" onclick="setConclusion('Approved')">APPROVED</button>
<button class="rejectBtn" onclick="setConclusion('Not Approved')">NOT APPROVED</button>
</div>

<div id="approvalMenu" class="approvalBox">

<label><input type="checkbox" value="Tractor Trailer"> Tractor Trailer</label><br>
<label><input type="checkbox" value="Tandem Steer"> Tandem Steer</label><br>
<label><input type="checkbox" value="Over Dimension"> Over Dimension</label><br>
<label><input type="checkbox" value="Automatic"> Automatic</label><br>
<label><input type="checkbox" value="Manual/Standard"> Manual / Standard</label>

</div>

</div>

<script>

let conclusion=""

function setConclusion(val){

conclusion=val

if(val==="Approved"){
document.getElementById("approvalMenu").style.display="block"
}else{
document.getElementById("approvalMenu").style.display="none"
}

}

</script>

<!-- NEXT EVALUATION -->

<div class="section">

<h3>Estimate Next Evaluation</h3>

<select id="next_type" onchange="toggleNextDate()">

<option value="date">Date (+3 Months)</option>
<option value="post">Post Incident / As Required</option>
<option value="na">N/A</option>

</select>

<input type="date" id="next_date">

</div>

<script>

function toggleNextDate(){

let type=document.getElementById("next_type").value
let field=document.getElementById("next_date")

if(type==="date"){

field.style.display="block"

let d=new Date()
d.setMonth(d.getMonth()+3)

field.value=d.toISOString().split("T")[0]

}else{

field.style.display="none"

}

}

toggleNextDate()

</script>

<!-- NOTES -->

<script>
section("notes","Notes")
</script>

<!-- SIGNATURES -->

<div class="section">

<h3>Trainer Signature</h3>
<canvas id="sig1"></canvas>
<button onclick="pad1.clear()">Clear</button>

<h3>Driver Signature</h3>
<canvas id="sig2"></canvas>
<button onclick="pad2.clear()">Clear</button>

</div>

<script>

const canvas1=document.getElementById("sig1")
const canvas2=document.getElementById("sig2")

const pad1=new SignaturePad(canvas1)
const pad2=new SignaturePad(canvas2)

function resize(){

[canvas1,canvas2].forEach(c=>{

let ratio=Math.max(window.devicePixelRatio||1,1)

c.width=c.offsetWidth*ratio
c.height=c.offsetHeight*ratio

c.getContext("2d").scale(ratio,ratio)

})

}

window.onresize=resize
resize()

</script>

</body>
</html>

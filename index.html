<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Training Evaluation</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:15px;
font-size:16px;
}

h2{
text-align:center;
}

.section{
background:#1e1e1e;
padding:18px;
margin-bottom:18px;
border-radius:10px;
}

textarea{
width:100%;
min-height:110px;
background:#2a2a2a;
color:white;
border:1px solid #444;
border-radius:6px;
padding:10px;
font-size:16px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#2a2a2a;
color:white;
border:1px solid #444;
border-radius:6px;
font-size:16px;
}

.controls{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.start{background:#222;color:#00e676}
.stop{background:#222;color:#ff5252}
.improve{background:#1565c0;color:white}

.rec-active{
animation:blink 1s infinite;
background:#600;
color:white;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

canvas{
background:white;
border-radius:8px;
width:100%;
height:180px;
}

.approvalBox{
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<h2>Driver Training & Assessment</h2>

<div class="section">

<label>Division</label>
<select id="division">
<option>Snubbing</option>
<option>Nitrogen</option>
<option>Shop</option>
</select>

<label>Trainer</label>
<select id="trainer">
<option selected>Dave Feaver</option>
<option>Other</option>
</select>

<label>Driver</label>
<input id="driver">

<label>Date</label>
<input type="date" id="date">

<label>DL Class</label>
<select id="dl_class">
<option value="1">Class 1 – Tractor Trailer</option>
<option value="3">Class 3 – Heavy Truck</option>
<option value="5">Class 5 – Standard Vehicle</option>
</select>

<label>Endorsement</label>
<select id="dl_end">
<option value="">None</option>
<option value="Q">Q – Air Brake</option>
</select>

<label>Units</label>
<input id="units">

</div>

<script>
document.getElementById("date").valueAsDate=new Date()
</script>

<!-- VOICE SCRIPT -->

<script>

let recognition
let activeArea
let stopBtn
let finalTranscript=""

function voiceStart(id,btn){

if(recognition)recognition.stop()

activeArea=document.getElementById(id)
stopBtn=btn.nextElementSibling
finalTranscript=activeArea.value

recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.continuous=true
recognition.interimResults=true

recognition.onstart=()=>{
stopBtn.classList.add("rec-active")
}

recognition.onresult=(e)=>{

let interim=""

for(let i=e.resultIndex;i<e.results.length;i++){

if(e.results[i].isFinal){
finalTranscript+=e.results[i][0].transcript+". "
}else{
interim+=e.results[i][0].transcript
}

}

activeArea.value=finalTranscript+interim

}

recognition.onend=()=>{
stopBtn.classList.remove("rec-active")
}

recognition.start()

}

function voiceStop(){
if(recognition)recognition.stop()
}

</script>

<!-- IMPROVE BUTTON -->

<script>

function improve(id){

let txt=document.getElementById(id).value

if(!txt)return

txt=txt.trim()

txt=txt.charAt(0).toUpperCase()+txt.slice(1)

if(!txt.endsWith(".")) txt+="."

document.getElementById(id).value=txt

}

</script>

<!-- SECTION GENERATOR -->

<script>

function section(id,title,desc){

document.write(`

<div class="section">

<h3>${title}</h3>
<p>${desc}</p>

<div class="controls">
<button class="start" onclick="voiceStart('${id}',this)">START</button>
<button class="stop" onclick="voiceStop()">STOP</button>
<button class="improve" onclick="improve('${id}')">Improve</button>
</div>

<textarea id="${id}"></textarea>

</div>

`)

}

</script>

<script>

section("general","1 General & Procedures",
"Accident procedures, inspections, coupling, chaining, backing, TDG")

section("main","2 Main Driving",
"Shifting ability, steering control, lane tracking, following distance")

section("intersections","3 Intersections & RR Crossings",
"Look Reach Listen, braking, gear control")

section("equipment","4 Equipment Operations",
"Clutch, transmission, engine brake")

section("defensive","5 Defensive Driving",
"Anticipating conflict, speed for conditions")

</script>

<!-- REMARKS -->

<script>

section("strengths","Strengths","Driver strengths observed")

section("weakness","Weakness","Areas needing improvement")

section("recommendations","Recommendations","Trainer recommendations")

</script>

<!-- CONCLUSION -->

<div class="section">

<h3>Conclusion</h3>

<button onclick="setConclusion('Not Approved')">Not Approved</button>
<button onclick="setConclusion('Approved')">Approved</button>

<div id="approvalMenu" class="approvalBox">

<h4>Approved For</h4>

<label><input type="checkbox" value="Tractor Trailer"> Tractor Trailer</label><br>
<label><input type="checkbox" value="Tandem Steer"> Tandem Steer</label><br>
<label><input type="checkbox" value="Over Dimension"> Over Dimension</label><br>
<label><input type="checkbox" value="Automatic"> Automatic</label><br>
<label><input type="checkbox" value="Manual/Standard"> Manual/Standard</label>

</div>

</div>

<script>

let conclusion=""

function setConclusion(val){

conclusion=val

if(val==="Approved"){
document.getElementById("approvalMenu").style.display="block"
}else{
document.getElementById("approvalMenu").style.display="none"
}

updateSummary()

}

</script>

<!-- NEXT EVAL -->

<div class="section">

<h3>Estimate Next Evaluation</h3>

<select id="next_type" onchange="nextEvalToggle()">

<option value="date">Date (+3 Months)</option>
<option value="post">Post Incidents / As Required</option>
<option value="na">N/A</option>

</select>

<input type="date" id="next_date">

</div>

<script>

function nextEvalToggle(){

let type=document.getElementById("next_type").value
let field=document.getElementById("next_date")

if(type==="date"){

field.style.display="block"

let d=new Date()
d.setMonth(d.getMonth()+3)

field.value=d.toISOString().split("T")[0]

}else{

field.style.display="none"

}

}

nextEvalToggle()

</script>

<!-- NOTES -->

<script>
section("notes","Notes","Additional notes")
</script>

<!-- SUMMARY -->

<div class="section">

<h3>Conclusion Summary</h3>

<div id="summary"></div>

</div>

<script>

function updateSummary(){

let approved=[]

document.querySelectorAll("#approvalMenu input:checked")
.forEach(x=>approved.push(x.value))

let txt="Conclusion: "+conclusion

if(conclusion==="Approved"){
txt+="<br>Approved For: "+approved.join(", ")
}

document.getElementById("summary").innerHTML=txt

}

document.querySelectorAll("#approvalMenu input")
.forEach(x=>x.onchange=updateSummary)

</script>

<!-- SIGNATURES -->

<div class="section">

<h3>Trainer Signature</h3>

<canvas id="sig1"></canvas>
<button onclick="pad1.clear()">Clear</button>

<h3>Driver Signature</h3>

<canvas id="sig2"></canvas>
<button onclick="pad2.clear()">Clear</button>

</div>

<script>

const canvas1=document.getElementById("sig1")
const canvas2=document.getElementById("sig2")

const pad1=new SignaturePad(canvas1)
const pad2=new SignaturePad(canvas2)

function resize(){

[canvas1,canvas2].forEach(c=>{

let r=Math.max(window.devicePixelRatio||1,1)

c.width=c.offsetWidth*r
c.height=c.offsetHeight*r

c.getContext("2d").scale(r,r)

})

}

window.onresize=resize
resize()

</script>

<!-- SUBMIT -->

<button onclick="submit()">Submit</button>

<script>

function submit(){

let dl=
document.getElementById("dl_class").value+
document.getElementById("dl_end").value

let nextType=document.getElementById("next_type").value
let nextEval=""

if(nextType==="date"){
nextEval=document.getElementById("next_date").value
}

if(nextType==="post"){
nextEval="Post Incidents / As Required"
}

if(nextType==="na"){
nextEval="N/A"
}

let approved=[]

document.querySelectorAll("#approvalMenu input:checked")
.forEach(x=>approved.push(x.value))

let data={

division:division.value,
trainer:trainer.value,
driver:driver.value,
date:date.value,

dl_class:dl,
units:units.value,

general:general.value,
main:main.value,
intersections:intersections.value,
equipment:equipment.value,
defensive:defensive.value,

strengths:strengths.value,
weakness:weakness.value,
recommendations:recommendations.value,

conclusion:conclusion,
approved_for:approved.join(", "),

next_evaluation:nextEval,

notes:notes.value,

sig_trainer:pad1.toDataURL(),
sig_driver:pad2.toDataURL()

}

console.log(data)

alert("Form ready for Google Apps Script")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 1 Eval - AB/BC</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        #gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input[type="password"] { font-size: 30px; width: 150px; text-align: center; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; }
        .form-section { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #ea4335; display: none; }
        .mic-btn { background: #ea4335; color: white; border: none; padding: 15px; border-radius: 5px; width: 100%; margin: 10px 0; font-size: 16px; cursor: pointer; }
        textarea { width: 100%; background: #333; color: white; border: none; padding: 10px; border-radius: 5px; box-sizing: border-box; }
        canvas { background: white; border-radius: 5px; width: 100%; height: 150px; }
    </style>
</head>
<body>

    <div id="gate">
        <h2>ENTER ACCESS CODE</h2>
        <input type="password" id="code" maxlength="4" oninput="checkCode(this.value)">
    </div>

    <div id="mainForm">
        <h1>Driver Evaluation</h1>
        
        <div class="form-section" style="display:block;">
            <h3>1. Pre-Trip & Air Brakes</h3>
            <button class="mic-btn" onclick="startVoice('eval1')">🎤 Record Comments</button>
            <textarea id="eval1" rows="3"></textarea>
        </div>

        <div class="form-section" style="display:block;">
            <h3>2. Coupling & Yard</h3>
            <button class="mic-btn" onclick="startVoice('eval2')">🎤 Record Comments</button>
            <textarea id="eval2" rows="3"></textarea>
        </div>

        <div class="form-section" style="display:block;">
            <h3>Signatures</h3>
            <p>Trainer Signature:</p>
            <canvas id="sigTrainer"></canvas>
            <p>Driver Signature:</p>
            <canvas id="sigDriver"></canvas>
        </div>

        <button onclick="submitForm()" style="width:100%; background: #34a853; color: white; padding: 20px; border: none; border-radius: 10px; font-size: 20px;">SUBMIT EVALUATION</button>
    </div>

    <script>
        function checkCode(val) {
            if (val === '2008') {
                document.getElementById('gate').style.display = 'none';
            }
        }

        const sig1 = new SignaturePad(document.getElementById('sigTrainer'));
        const sig2 = new SignaturePad(document.getElementById('sigDriver'));

        async function startVoice(targetId) {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onresult = (event) => {
                document.getElementById(targetId).value += event.results[0][0].transcript + " ";
            };
            recognition.start();
        }

        function submitForm() {
            alert("Saving Evaluation and Signatures to Google Sheet...");
            // Here we will add the fetch code to send to your Google Sheet!
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Voice Form</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        #micBtn { width: 100px; height: 100px; border-radius: 50%; border: none; background: #ea4335; color: white; font-size: 30px; cursor: pointer; }
        #status { margin: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Driver Evaluation</h2>
    <button id="micBtn">🎤</button>
    <div id="status">Ready</div>
    <textarea id="output" rows="5" style="width:80%"></textarea>

    <script>
        const btn = document.getElementById('micBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        btn.onclick = async () => {
            try {
                // GitHub allows this! No 'Permissions Policy' block here.
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                
                recognition.onstart = () => { status.textContent = "Listening..."; };
                recognition.onresult = (event) => {
                    const text = event.results[0][0].transcript;
                    output.value = text;
                    sendToGoogle(text);
                };
                recognition.start();
            } catch (e) {
                status.textContent = "Error: " + e.message;
            }
        };

        function sendToGoogle(text) {
            status.textContent = "Saving to Google Sheets...";
            // REPLACE THIS URL with your Google Script /exec link
            const url = "YOUR_GOOGLE_SCRIPT_EXEC_URL";
            
            fetch(url, {
                method: "POST",
                mode: "no-cors", // This bypasses Google's security wall
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "transcript": text })
            }).then(() => {
                status.textContent = "✅ Saved!";
            });
        }
    </script>
</body>
</html>
